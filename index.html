<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Meetfleet — The History's First Social OS</title>
    <meta name="description" content="Meetfleet is an inclusive R&D infrastructure designed to solve loneliness for everyone, from students looking for study partners to neighbors wanting to explore local markets together." />
    <meta name="author" content="Meetfleet" />
    <meta name="theme-color" content="#ffffff" />
    <link rel="canonical" href="https://meetfleet.org/" />
    <link rel="preload" as="image" href="/message/image.webp" fetchpriority="high" />

    <!-- Icons (favicon.png for Dark mode, fav.png for Light mode) -->
    <link rel="icon" id="favicon" type="image/png" href="/fav.png" />
    <link rel="icon" type="image/png" href="/fav.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" type="image/png" href="/favicon.png" media="(prefers-color-scheme: dark)" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <script>
      (function() {
        function setFavicon() {
          var isDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var link = document.getElementById('favicon');
          if (link) {
            link.href = isDark ? '/favicon.png' : '/fav.png';
          }
        }
        setFavicon();
        if (window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', setFavicon);
        }
      })();
    </script>

    <!-- Open Graph / Facebook / WhatsApp / iMessage / Telegram / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Meetfleet" />
    <meta property="og:title" content="Meetfleet — The History's First Social OS" />
    <meta property="og:description" content="Meetfleet is an inclusive R&D infrastructure designed to solve loneliness for everyone, from students looking for study partners to neighbors wanting to explore local markets together." />
    <meta property="og:url" content="https://meetfleet.org/" />
    <meta property="og:image" content="https://meetfleet.org/og.jpg" />
    <meta property="og:image:secure_url" content="https://meetfleet.org/og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1280" />
    <meta property="og:image:height" content="720" />
    <meta property="og:image:alt" content="Meetfleet — The History's First Social OS" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:domain" content="meetfleet.org" />
    <meta name="twitter:url" content="https://meetfleet.org/" />
    <meta name="twitter:title" content="Meetfleet — The History's First Social OS" />
    <meta name="twitter:description" content="Meetfleet is an inclusive R&D infrastructure designed to solve loneliness for everyone, from students looking for study partners to neighbors wanting to explore local markets together." />
    <meta name="twitter:image" content="https://meetfleet.org/og.jpg" />
    <meta name="twitter:image:alt" content="Meetfleet — The History's First Social OS" />

    <!-- Structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Meetfleet",
        "url": "https://meetfleet.org/",
        "logo": "https://meetfleet.org/favicon.svg",
        "description": "The History's First Social OS"
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
